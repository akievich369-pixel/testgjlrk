<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обучение: Провайдеры</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #f4f0ff 0%, #e0d4f7 100%);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; padding: 10px; color: #2d3436;
        }

        #chat-container {
            width: 100%; max-width: 550px; height: 85vh;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px); border-radius: 24px;
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.15);
            display: flex; flex-direction: column; overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        header {
            padding: 15px 20px;
            background: rgba(108, 92, 231, 0.05);
            border-bottom: 1px solid rgba(108, 92, 231, 0.1);
            text-align: center;
        }
        header h1 {
            font-size: 14px; color: #6c5ce7;
            text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700;
        }

        #messages { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; }

        .msg-row { display: flex; align-items: flex-end; gap: 12px; max-width: 90%; }
        .bot-row { align-self: flex-start; }
        .user-row { align-self: flex-end; flex-direction: row-reverse; }

        .avatar-container {
            width: 45px; height: 45px; flex-shrink: 0;
            border-radius: 50%; overflow: hidden;
            border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            background: #fff;
        }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .msg {
            padding: 14px 18px; border-radius: 20px;
            font-size: 15px; line-height: 1.4; opacity: 0;
            transform: translateY(10px); animation: fadeIn 0.3s forwards;
        }

        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

        .bot-msg { background: #ffffff; color: #2d3436; border-bottom-left-radius: 4px; border: 1px solid #eee; }
        .user-msg { background: #6c5ce7; color: #ffffff; border-bottom-right-radius: 4px; }

        /* КАРТОЧКА РЕЗУЛЬТАТОВ */
        .check-card {
            background: #ffffff; border-radius: 18px; padding: 20px;
            margin-top: 10px; border: 1px solid #6c5ce7;
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.1);
        }
        .check-header { font-weight: bold; color: #6c5ce7; margin-bottom: 20px; border-bottom: 1px solid #f0edff; padding-bottom: 8px; }
        
        .check-item { 
            font-size: 14px; 
            margin-bottom: 30px; /* Еще чуть больше отступа между вопросами */
            color: #636e72; 
        }
        .check-item b { color: #2d3436; display: block; margin-bottom: 8px; line-height: 1.3; font-size: 12px; }
        
        .ans-label { color: #000000; font-weight: 500; } /* ЧЕРНЫЙ для заголовка */
        .ans-value { color: #00b894; font-weight: 500; } /* ЗЕЛЕНЫЙ для самого ответа */
        
        .ans-block { 
            display: block; 
            margin-top: 10px; 
            padding-left: 10px;
            border-left: 3px solid #6c5ce7;
        }

        .typing { color: #a29bfe; font-size: 13px; padding: 10px 25px; display: none; }

        #chat-form { border-top: 1px solid rgba(108, 92, 231, 0.1); padding: 15px 25px; background: white; }
        #input-area { display: flex; gap: 12px; }
        input[type="text"] { flex: 1; border: 2px solid #f0f0f0; border-radius: 25px; padding: 12px 20px; outline: none; font-size: 15px; }
        button { background: #6c5ce7; border: none; border-radius: 50%; width: 48px; height: 48px; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        button svg { width: 22px; height: 22px; fill: white; }
    </style>
</head>
<body>

<div id="chat-container">
    <header><h1>Нюансы по работе с провайдерами</h1></header>
    <div id="messages"></div>
    <div class="typing" id="typing-indicator">Печатает...</div>
    <form id="chat-form">
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Ваш ответ..." required autocomplete="off">
            <button type="submit">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </form>
</div>

Sn6uct+tdhRRXrRhGC5YqyPnZ1J1Zc1RtvzCiiirMwooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKAP/9k=';

    const quiz = [
	{ q: "Подскажи свой ID в HDE" },

        { q: "Представь, что отельер, работающий с нами через Bnovo, звонит в панике: «Где мои деньги?! То есть... как гость оплатил бронь?!». Куда ты его нежно отправишь в рамках интерфейса Bnovo?", a: "Способ оплаты указывается в поле «Комментарий гостя»" },
        { q: "Размер штрафа для Reality Calendar вдруг стал кусаться для гостей, и партнёр попросил тебя его изменить. Где ты можешь это сделать?", a: "Можно изменить в Админке в поле «Политики отмены»" },
        { q: "Какие провайдеры настолько честны, что передают нам даже информацию по депозиту?", a: "Bronevik, Ostrovok, RC" },
        { q: "Откуда берутся цифры о расстоянии до моря, которые иногда заставляют гостей верить в свои сверхспособности к бегу?🏃🏻‍♀️‍➡️", a: "Из 2ГИС" },
        { q: "Для каких провайдеров описание всегда генерируется ИИ?", a: "Bnovo и Личный кабинет" },
        { q: "У какого провайдера нет удобств номеров, есть только «антиудобства» (Номер без окна, Общий санузел)?", a: "Kontur" },
        { q: "Если в 2ГИС объект гордо зовётся «Базой отдыха», то что будет на Отелло?", a: "Турбаза" }
    ];

    let step = 0;
    let history = [];

    const msgs = document.getElementById('messages');
    const form = document.getElementById('chat-form');
    const input = document.getElementById('user-input');
    const loader = document.getElementById('typing-indicator');

    function add(text, role) {
        const row = document.createElement('div');
        row.className = `msg-row ${role}-row`;
        row.innerHTML = `
            <div class="avatar-container">
                <img src="${role==='bot' ? BOT_IMG : USER_IMG}" class="avatar-img">
            </div>
            <div class="msg ${role}-msg">${text}</div>
        `;
        msgs.appendChild(row);
        msgs.scrollTop = msgs.scrollHeight;
    }

    function showFinalAnswers() {
        const card = document.createElement('div');
    card.className = 'check-card';
    card.innerHTML = `<div class="check-header"> Лист самопроверки:</div>` + 
        // Добавляем .slice(1) перед .map
        quiz.slice(1).map(i => `
            <div class="check-item">
                <b>${i.q}</b>
                <span class="ans-block">
                    <span class="ans-label">Верный ответ:</span> 
                    <span class="ans-value">${i.a}</span>
                </span>
            </div>`).join('');
    msgs.appendChild(card);
    msgs.scrollTop = msgs.scrollHeight;
    form.style.display = 'none';
}

    form.onsubmit = (e) => {
        e.preventDefault();
        const val = input.value.trim();
        if(!val) return;

        add(val, 'user');
        history.push({ q: quiz[step].q, u: val });
        input.value = '';
        step++;
        loader.style.display = 'block';

        setTimeout(() => {
            loader.style.display = 'none';
            if(step < quiz.length) {
                add(quiz[step].q, 'bot');
            } else {
                add("Готово! Ответы сохранены☑️ Ниже представлена шпаргалка для тебя.", 'bot');
                showFinalAnswers();
                fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(history) });
            }
        }, 1000);
    };

    window.onload = () => {
        add("Привет! Давай воспользуемся статьями на Вики и постараемся найти ответы на следующие вопросы 🔍", 'bot');
        setTimeout(() => add(quiz[0].q, 'bot'), 1000);
    };
</script>
